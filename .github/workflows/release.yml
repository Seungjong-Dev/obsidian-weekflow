name: Release

on:
  push:
    tags:
      - "*.*.*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install
      - run: npm run build

      - name: Extract annotated tag message
        id: tag_msg
        run: |
          {
            echo 'body<<TAG_EOF'
            git tag -l --format='%(contents)' "${GITHUB_REF_NAME}"
            echo TAG_EOF
          } >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.tag_msg.outputs.body }}
          files: |
            main.js
            manifest.json
            styles.css
